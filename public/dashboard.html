<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/dashboard.css" />
  <link rel="stylesheet" href="/css/portfolio.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <p class="sidebar-kicker">Portfolio Platform</p>
        <h1>Admin</h1>
      </div>

      <nav>
        <ul class="nav-list">
          <li class="nav-item active" data-page="projects">Portfolio</li>
          <li class="nav-item" data-href="/add-project.html">Add Portfolio</li>
          <li class="nav-item" data-page="contacts">Contacts</li>
        </ul>
      </nav>
    </aside>

    <div class="main">
      <header class="header">
        <div>
          <p class="header-kicker">Control Center</p>
          <span class="header-title">Portfolio Dashboard</span>
        </div>
        <button id="logout" class="ghost-btn">Logout</button>
      </header>

      <section class="content" id="content">
        <div class="panel-head">
          <h2>Portfolio Overview</h2>
        </div>

        <p class="panel-copy">
          Review your latest portfolio entries, open their galleries, and edit each one from this page.
        </p>

        <pre id="output" class="output-card">Loading portfolio...</pre>
      </section>
    </div>
  </div>

  <script src="/js/portfolio.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
